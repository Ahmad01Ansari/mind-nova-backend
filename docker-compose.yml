version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindnova_postgres
    restart: always
    environment:
      POSTGRES_USER: ahmad
      POSTGRES_PASSWORD: sk_7VoonaJvfl-SeLXzncT23
      POSTGRES_DB: mindnova
    ports:
      - '5432:5432'
